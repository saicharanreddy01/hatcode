<div class="app-main" id="app-main">
    <header class="topbar">
        <div class="topbar-left"><h1 class="topbar-title">Rules</h1></div>
        <div class="topbar-right">
            <button class="topbar-icon-btn" aria-label="Notifications">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            </button>
            <div class="topbar-avatar">SC</div>
        </div>
    </header>

    <main class="app-content">

        <div class="rules-layout">

            <!-- LEFT: Rule list -->
            <div class="rules-list-panel">
                <div class="rules-list-header">
                    <h2 class="rules-list-title">Active rules <span id="rules-count-badge">(6)</span></h2>
                    <button class="btn-add-rule" id="btn-add-rule">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Add rule
                    </button>
                </div>
                <div class="rules-list" id="rules-list"></div>
            </div>

            <!-- RIGHT: Editor -->
            <div class="rule-editor-panel">
                <div class="rule-editor-header">
                    <h2 class="rule-editor-title" id="editor-title">Edit rule</h2>
                    <span class="rule-editor-badge" id="editor-badge">customers.email</span>
                </div>

                <div class="rule-form">
                    <div class="rf-group">
                        <label class="rf-label">Table</label>
                        <select class="rf-select" id="rf-table">
                            <option value="customers">customers</option>
                            <option value="orders">orders</option>
                            <option value="products">products</option>
                        </select>
                    </div>

                    <div class="rf-group">
                        <label class="rf-label">Column</label>
                        <select class="rf-select" id="rf-column">
                            <option value="email">email</option>
                            <option value="name">name</option>
                            <option value="age">age</option>
                        </select>
                    </div>

                    <div class="rf-group">
                        <label class="rf-label">Rule type</label>
                        <select class="rf-select" id="rf-type">
                            <option value="NOT_NULL">NOT_NULL</option>
                            <option value="UNIQUE">UNIQUE</option>
                            <option value="RANGE">RANGE</option>
                            <option value="REGEX">REGEX</option>
                            <option value="FOREIGN_KEY">FOREIGN_KEY</option>
                            <option value="CUSTOM_SQL">CUSTOM_SQL</option>
                            <option value="ROW_COUNT_MIN">ROW_COUNT_MIN</option>
                        </select>
                    </div>

                    <div class="rf-group" id="rf-threshold-group">
                        <label class="rf-label">Threshold (%)</label>
                        <input class="rf-input" type="number" id="rf-threshold" value="0.0" step="0.1" min="0" max="100" />
                    </div>

                    <div class="rf-group" id="rf-range-group" style="display:none">
                        <label class="rf-label">Range</label>
                        <div class="rf-range-row">
                            <input class="rf-input" type="number" id="rf-min" placeholder="Min" />
                            <span class="rf-range-sep">to</span>
                            <input class="rf-input" type="number" id="rf-max" placeholder="Max" />
                        </div>
                    </div>

                    <div class="rf-group">
                        <label class="rf-label">Severity</label>
                        <div class="rf-severity-options">
                            <label class="rf-sev-opt">
                                <input type="radio" name="severity" value="error" hidden />
                                <span class="rf-sev-dot error"></span> Error
                            </label>
                            <label class="rf-sev-opt selected">
                                <input type="radio" name="severity" value="warning" checked hidden />
                                <span class="rf-sev-dot warning"></span> Warning
                            </label>
                            <label class="rf-sev-opt">
                                <input type="radio" name="severity" value="info" hidden />
                                <span class="rf-sev-dot info"></span> Info
                            </label>
                        </div>
                    </div>

                    <div class="rf-actions">
                        <button class="btn-save-rule" id="btn-save-rule">Save rule</button>
                        <button class="btn-delete-rule" id="btn-delete-rule">Delete rule</button>
                    </div>
                </div>
            </div>

        </div>

    </main>
</div>
