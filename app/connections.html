<!-- ADD CONNECTION MODAL -->
<div class="modal-overlay" id="add-conn-modal">
    <div class="modal-box">

        <div class="modal-header">
            <h2 class="modal-title">Add a new connection</h2>
            <button class="modal-close" id="modal-close">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <!-- Step indicator -->
        <div class="step-indicator">
            <div class="step-item active" id="step-1-ind">
                <div class="step-num">1</div>
                <span>Choose database</span>
            </div>
            <div class="step-line"></div>
            <div class="step-item" id="step-2-ind">
                <div class="step-num">2</div>
                <span>Configure</span>
            </div>
            <div class="step-line"></div>
            <div class="step-item" id="step-3-ind">
                <div class="step-num">3</div>
                <span>Test & save</span>
            </div>
        </div>

        <!-- Step 1: Choose DB -->
        <div class="modal-step active" id="step-1">
            <div class="db-type-grid">
                <label class="db-type-card selected" data-db="postgresql">
                    <input type="radio" name="dbtype" value="postgresql" checked hidden />
                    <div class="db-type-icon">🐘</div>
                    <span>PostgreSQL</span>
                </label>
                <label class="db-type-card" data-db="mysql">
                    <input type="radio" name="dbtype" value="mysql" hidden />
                    <div class="db-type-icon">🐬</div>
                    <span>MySQL</span>
                </label>
                <label class="db-type-card" data-db="sqlite">
                    <input type="radio" name="dbtype" value="sqlite" hidden />
                    <div class="db-type-icon">📦</div>
                    <span>SQLite</span>
                </label>
                <label class="db-type-card" data-db="oracle">
                    <input type="radio" name="dbtype" value="oracle" hidden />
                    <div class="db-type-icon">🔶</div>
                    <span>Oracle</span>
                </label>
                <label class="db-type-card" data-db="sqlserver">
                    <input type="radio" name="dbtype" value="sqlserver" hidden />
                    <div class="db-type-icon">🪟</div>
                    <span>SQL Server</span>
                </label>
                <label class="db-type-card" data-db="mariadb">
                    <input type="radio" name="dbtype" value="mariadb" hidden />
                    <div class="db-type-icon">🦭</div>
                    <span>MariaDB</span>
                </label>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-next" id="step1-next">Continue →</button>
            </div>
        </div>

        <!-- Step 2: Configure -->
        <div class="modal-step" id="step-2">
            <div class="modal-form">
                <div class="rf-group">
                    <label class="rf-label">Connection name</label>
                    <input class="rf-input" type="text" placeholder="e.g. Staging Database" />
                </div>
                <div class="modal-form-row">
                    <div class="rf-group" style="flex:2">
                        <label class="rf-label">Host / IP address</label>
                        <input class="rf-input" type="text" placeholder="db.example.com" />
                    </div>
                    <div class="rf-group" style="flex:1">
                        <label class="rf-label">Port</label>
                        <input class="rf-input" type="text" placeholder="5432" />
                    </div>
                </div>
                <div class="rf-group">
                    <label class="rf-label">Database name</label>
                    <input class="rf-input" type="text" placeholder="my_database" />
                </div>
                <div class="modal-form-row">
                    <div class="rf-group">
                        <label class="rf-label">Username</label>
                        <input class="rf-input" type="text" placeholder="db_user" />
                    </div>
                    <div class="rf-group">
                        <label class="rf-label">Password</label>
                        <input class="rf-input" type="password" placeholder="••••••••" />
                    </div>
                </div>
                <div class="modal-form-row">
                    <div class="rf-group">
                        <label class="rf-label">Schema (optional)</label>
                        <input class="rf-input" type="text" placeholder="public" />
                    </div>
                    <div class="rf-group toggle-group">
                        <label class="rf-label">SSL</label>
                        <button class="toggle-switch" id="ssl-toggle"></button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-back" id="step2-back">← Back</button>
                <button class="btn-modal-next" id="step2-next">Continue →</button>
            </div>
        </div>

        <!-- Step 3: Test & save -->
        <div class="modal-step" id="step-3">
            <div class="test-conn-area" id="test-conn-area">
                <div class="test-conn-prompt">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    <p>Ready to test the connection</p>
                    <button class="btn-test-conn" id="btn-test-conn">Test connection</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-back" id="step3-back">← Back</button>
                <button class="btn-modal-save hidden" id="btn-save-conn">Save connection</button>
            </div>
        </div>

    </div>
</div>
